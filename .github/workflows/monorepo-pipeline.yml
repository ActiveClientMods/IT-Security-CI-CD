name: NestJS Monorepo CI/CD Pipeline

on:
  push:
    branches:
      - development
      - release
  pull_request:
    branches:
      - development
      - release
    types: [opened, synchronize, reopened]

# Prevent multiple workflows from running simultaneously
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default permissions (minimal access)
permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  # ==========================================
  # JOB 1: Initialize and Detect Changes
  # ==========================================
  initialize:
    name: Initialize Pipeline
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      version: ${{ steps.version.outputs.version }}
      backend_changed: ${{ steps.changes.outputs.backend }}
      shared_changed: ${{ steps.changes.outputs.shared }}
      any_changed: ${{ steps.changes.outputs.any }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect Changes
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            backend:
              - 'nestjs_backend/**'
              - '.env'
              - 'docker-compose.yml'
              - '.github/workflows/**'
            shared:
              - '.env'
              - 'docker-compose.yml'
              - '.github/**'
            any:
              - '**'

      - name: Check Deployment Conditions
        id: check
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/release" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/release" ]]; then
            VERSION=$(date +'%Y.%m.%d')-${GITHUB_SHA::7}
          else
            VERSION=dev-${GITHUB_SHA::7}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  # ==========================================
  # JOB 2: Secret Scanning with Gitleaks
  # ==========================================
  gitleaks-scan:
    name: GitLeaks Secret Scanning
    runs-on: ubuntu-latest
    if: always()
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code (Last 2 Commits)
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  # ==========================================
  # JOB 3: Backend Dependency Vulnerability Scanning
  # ==========================================
  backend-dependency-check:
    name: Backend OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: [initialize]
    if: needs.initialize.outputs.backend_changed == 'true'
    permissions:
      security-events: write
      actions: read
      contents: read
    defaults:
      run:
        working-directory: ./nestjs_backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Run OWASP Dependency Check (SARIF)
        id: owasp-sarif
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        with:
          project: "nestjs-backend"
          path: "./nestjs_backend"
          format: "SARIF"
          out: "nestjs_backend/reports"
          args: >
            --enableRetired
            --enableExperimental
            --failOnCVSS 7

      - name: Run OWASP Dependency Check (JSON for parsing)
        id: owasp-json
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        with:
          project: "nestjs-backend"
          path: "./nestjs_backend"
          format: "JSON"
          out: "nestjs_backend/reports-json"
          args: >
            --enableRetired
            --enableExperimental
            --failOnCVSS 7

      - name: Upload Backend Dependency Check Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-dependency-check-report
          path: |
            nestjs_backend/reports/
            nestjs_backend/reports-json/

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('nestjs_backend/reports/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: nestjs_backend/reports/dependency-check-report.sarif
          category: backend-dependency-check

      - name: Fail Job if Vulnerabilities Found
        if: always()
        run: |
          echo "Checking OWASP Dependency Check results..."

          if [[ "${{ steps.owasp-sarif.outcome }}" == "failure" ]]; then
            echo "❌ CRITICAL: OWASP Dependency Check found vulnerabilities with CVSS >= 7.0"
            echo "SARIF scan outcome: ${{ steps.owasp-sarif.outcome }}"
            exit 1
          elif [[ "${{ steps.owasp-json.outcome }}" == "failure" ]]; then
            echo "❌ CRITICAL: OWASP Dependency Check found vulnerabilities with CVSS >= 7.0"
            echo "JSON scan outcome: ${{ steps.owasp-json.outcome }}"
            exit 1
          else
            echo "✅ No critical vulnerabilities found"
          fi

  # ==========================================
  # JOB 4: CodeQL Analysis (Backend only)
  # ==========================================
  codeql-analysis:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    needs: [initialize]
    if: needs.initialize.outputs.backend_changed == 'true'
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["typescript"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          source-root: nestjs_backend

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  # ==========================================
  # JOB 5: Build Backend Application (NestJS)
  # ==========================================
  build-and-test-backend:
    name: Build Backend Application
    runs-on: ubuntu-latest
    needs: [initialize]
    if: needs.initialize.outputs.backend_changed == 'true'
    defaults:
      run:
        working-directory: ./nestjs_backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup pnpm and Node.js
        uses: ./.github/actions/setup-pnpm

      - name: Check for Deprecated Dependencies
        run: |
          echo "Checking for deprecated pnpm packages..."
          pnpm outdated || true
          pnpm dlx npm-check-updates --doctor || true

          if pnpm list --depth=0 2>&1 | grep -i deprecated; then
            echo "⚠️ Deprecated packages found!"
            pnpm list --depth=0 2>&1 | grep -i deprecated > deprecated-packages.txt
          else
            echo "✅ No deprecated packages found"
            echo "No deprecated packages" > deprecated-packages.txt
          fi

      - name: Build Backend Application
        run: pnpm run build

      - name: License Compliance Check
        run: |
          echo "Running license compliance check..."

          # Install license checker globally
          pnpm add -g license-checker

          # Generate license reports
          license-checker --json --out license-report.json || true
          license-checker --csv --out license-report.csv || true
          license-checker --summary > license-summary.txt || true

          echo "License Summary:"
          cat license-summary.txt

          # Check for critical license issues (excluding our own private package)
          CRITICAL_LICENSES=0
          UNLICENSED_COUNT=$(grep -c "UNLICENSED" license-summary.txt || echo "0")

          if [ "$UNLICENSED_COUNT" -gt 0 ]; then
            echo "⚠️ Found $UNLICENSED_COUNT UNLICENSED packages, checking details..."
            UNLICENSED_PACKAGES=$(license-checker --json | jq -r 'to_entries[] | select(.value.licenses == "UNLICENSED") | .key')
            
            for package in $UNLICENSED_PACKAGES; do
              if [[ "$package" == nestjs_backend* ]] || [[ "$package" == *"@workspace"* ]]; then
                echo "✅ INFO: $package is our own private package (expected UNLICENSED status)"
              else
                echo "❌ CRITICAL: $package is an external package without a license!"
                CRITICAL_LICENSES=$((CRITICAL_LICENSES + 1))
              fi
            done
          fi

          # Check for copyleft licenses
          for license in "GPL" "AGPL" "LGPL" "CPAL" "OSL"; do
            if grep -q "$license" license-summary.txt; then
              echo "❌ CRITICAL: Found $license license which may require code disclosure!"
              CRITICAL_LICENSES=$((CRITICAL_LICENSES + 1))
            fi
          done

          if [ $CRITICAL_LICENSES -gt 0 ]; then
            echo "❌ CRITICAL LICENSE ISSUES FOUND: $CRITICAL_LICENSES"
            exit 1
          else
            echo "✅ License compliance check passed"
          fi

      - name: ✅ Build Verification
        run: |
          echo "✅ Backend application built successfully"
          echo "Note: All tests (unit & E2E) run in 'Integration Tests' job with live services"
          echo "Build artifacts will be used by subsequent jobs"

      - name: Upload Backend Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-artifacts
          path: nestjs_backend/dist/

      - name: Upload Deprecated Packages Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-deprecated-packages
          path: nestjs_backend/deprecated-packages.txt

      - name: Upload License Compliance Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-license-compliance
          path: |
            nestjs_backend/license-report.json
            nestjs_backend/license-report.csv
            nestjs_backend/license-summary.txt

  # ==========================================
  # JOB 6: SonarCloud Quality Analysis (Post-Testing)
  # ==========================================
  sonarcloud:
    name: SonarCloud Quality Gate
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, integration-test]
    if: needs.build-and-test-backend.result == 'success' && needs.integration-test.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Test Coverage Reports
        uses: actions/download-artifact@v4
        with:
          name: complete-test-suite-coverage
          path: nestjs_backend/coverage/

      - name: SonarCloud Scan
        id: sonar-scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Check Quality Gate
        if: success()
        run: |
          echo "✅ SonarCloud Quality Gate passed"

  # ==========================================
  # JOB 7: IaC Scanning with Checkov
  # ==========================================
  checkov-iac-scan:
    name: Checkov IaC Security
    runs-on: ubuntu-latest
    needs: [initialize]
    if: needs.initialize.outputs.any_changed == 'true'
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Create Checkov Output Directory
        run: mkdir -p checkov-output

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@master
        continue-on-error: true
        with:
          directory: .
          framework: all
          output_format: sarif,json,cli
          output_file_path: checkov-output
          soft_fail: true
          quiet: false
          compact: true

      - name: List Checkov Output Files
        if: always()
        run: |
          echo "=== Checkov Output Directory Contents ==="
          ls -la checkov-output/ || echo "Directory not found"
          echo "=== Current Directory Contents ==="
          ls -la . | grep checkov || echo "No checkov files in current directory"

      - name: Upload Checkov Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-report
          path: |
            checkov-output/
            results_sarif.sarif
            results_json.json
          if-no-files-found: warn

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: checkov-output/results_sarif.sarif
          category: checkov

  # ==========================================
  # JOB 8: Docker Build and Trivy Scan
  # ==========================================
  docker-build-scan:
    name: Docker Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: [initialize, build-and-test-backend]
    if: needs.build-and-test-backend.result == 'success'
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      matrix:
        service: [backend]
        include:
          - service: backend
            context: ./nestjs_backend
            dockerfile: ./nestjs_backend/Dockerfile
            artifacts: backend-build-artifacts
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download Build Artifacts (${{ matrix.service }})
        if: matrix.artifacts != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifacts }}
          path: nestjs_backend/dist

      - name: Generate Docker Image Name
        id: docker-meta
        run: |
          DOCKER_IMAGE_NAME=$(echo "${{ github.repository }}-${{ matrix.service }}" | tr '[:upper:]' '[:lower:]')
          echo "image-name=$DOCKER_IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "Docker image name: $DOCKER_IMAGE_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (${{ matrix.service }})
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.docker-meta.outputs.image-name }}:${{ needs.initialize.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Filesystem Scan (${{ matrix.service }})
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: ${{ matrix.context }}
          format: "sarif"
          output: "trivy-fs-${{ matrix.service }}-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          scanners: "vuln,misconfig"

      - name: Run Trivy Container Image Scan (${{ matrix.service }})
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: ${{ steps.docker-meta.outputs.image-name }}:${{ needs.initialize.outputs.version }}
          format: "sarif"
          output: "trivy-image-${{ matrix.service }}-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          scanners: "vuln,misconfig"

      - name: Check Trivy Results for Critical/High Vulnerabilities
        id: check-trivy
        if: always()
        run: |
          echo "Analyzing Trivy scan results..."

          CRITICAL_COUNT=0
          HIGH_COUNT=0

          for trivy_file in trivy-*-${{ matrix.service }}-results.sarif; do
            if [ -f "$trivy_file" ]; then
              echo "Checking $trivy_file"
              
              CRIT=$(jq '[.runs[]?.results[]? // empty | select(.level=="error")] | length' "$trivy_file" 2>/dev/null || echo "0")
              HIGH=$(jq '[.runs[]?.results[]? // empty | select(.level=="warning")] | length' "$trivy_file" 2>/dev/null || echo "0")
              
              CRITICAL_COUNT=$((CRITICAL_COUNT + CRIT))
              HIGH_COUNT=$((HIGH_COUNT + HIGH))
              
              echo "File: $trivy_file - Critical: $CRIT, High: $HIGH"
            fi
          done

          echo "Total vulnerabilities found:"
          echo "  Critical: $CRITICAL_COUNT"
          echo "  High: $HIGH_COUNT"

          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "high_count=$HIGH_COUNT" >> $GITHUB_OUTPUT

          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "FAIL_REASON=critical" >> $GITHUB_OUTPUT
            exit 0
          elif [ "$HIGH_COUNT" -gt 10 ]; then
            echo "FAIL_REASON=high" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "FAIL_REASON=none" >> $GITHUB_OUTPUT
          fi

      - name: Upload Trivy SARIF to GitHub Security (${{ matrix.service }} - FS)
        if: always() && hashFiles('trivy-fs-${{ matrix.service }}-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-${{ matrix.service }}-results.sarif
          category: trivy-${{ matrix.service }}-filesystem

      - name: Upload Trivy SARIF to GitHub Security (${{ matrix.service }} - Image)
        if: always() && hashFiles('trivy-image-${{ matrix.service }}-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-${{ matrix.service }}-results.sarif
          category: trivy-${{ matrix.service }}-container

      - name: Fail Job if Critical Vulnerabilities Found
        if: always() && steps.check-trivy.outputs.fail_reason != 'none'
        run: |
          echo "================================================"
          echo "CRITICAL: Container Security Vulnerabilities Detected"
          echo "================================================"

          if [[ "${{ steps.check-trivy.outputs.fail_reason }}" == "critical" ]]; then
            echo "Found ${{ steps.check-trivy.outputs.critical_count }} CRITICAL vulnerabilities"
            echo "Action required: These must be fixed before deployment"
          elif [[ "${{ steps.check-trivy.outputs.fail_reason }}" == "high" ]]; then
            echo "Found ${{ steps.check-trivy.outputs.high_count }} HIGH vulnerabilities (threshold: 10)"
            echo "Action required: Reduce high-severity vulnerabilities"
          fi

          echo ""
          echo "Recommendations:"
          echo "1. Update base image to latest version"
          echo "2. Update vulnerable dependencies"
          echo "3. Review Trivy reports in workflow artifacts"
          echo "4. Check GitHub Security tab for details"

          exit 1

      - name: Upload Trivy Results (${{ matrix.service }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}-reports
          path: trivy-*-${{ matrix.service }}-results.sarif

      - name: Upload Trivy SARIF to GitHub Security (${{ matrix.service }} - FS)
        if: always() && hashFiles('trivy-fs-${{ matrix.service }}-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs-${{ matrix.service }}-results.sarif
          category: trivy-${{ matrix.service }}-filesystem

      - name: Upload Trivy SARIF to GitHub Security (${{ matrix.service }} - Image)
        if: always() && hashFiles('trivy-image-${{ matrix.service }}-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-${{ matrix.service }}-results.sarif
          category: trivy-${{ matrix.service }}-container

  # ==========================================
  # JOB 9: Complete Test Suite (Unit & E2E Integration)
  # ==========================================
  integration-test:
    name: Complete Test Suite
    runs-on: ubuntu-latest
    needs: [docker-build-scan]
    if: needs.docker-build-scan.result == 'success'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download Backend Artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-build-artifacts
          path: nestjs_backend/dist/

      - name: Create Integration Test Environment
        run: |
          echo "Setting up integration test environment..."

          cat > .env << EOF
          NODE_ENV=production
          PORT=3000
          DB_NAME=appdb
          DB_USER=appuser
          DB_PASSWORD=apppass
          REDIS_PASSWORD=redispass
          EOF

          echo "✅ Environment configuration created"

      - name: Run Docker Compose
        run: |
          echo "Starting services with docker compose..."
          docker compose up -d --build

          if [ $? -ne 0 ]; then
            echo "❌ Failed to start services"
            docker compose logs
            exit 1
          fi

          echo "⏳ Waiting for services to be ready..."
          sleep 45

          echo "Checking service health..."
          docker compose ps

          echo "🧪 Running basic integration tests..."
          for i in 1 2 3 4 5; do
            if curl -f http://localhost:3000/health 2>/dev/null; then
              echo "✅ Backend health check passed"
              break
            else
              echo "⏳ Attempt $i: Backend not ready yet, waiting..."
              sleep 10
            fi
          done

          curl -f http://localhost:3000/health || echo "❌ Backend health check failed after multiple attempts"

      - name: Setup pnpm and Node.js for Testing
        uses: ./.github/actions/setup-pnpm

      - name: Run Complete NestJS Test Suite
        working-directory: ./nestjs_backend
        run: |
          echo "Running complete NestJS test suite against live services..."
          echo "This includes both unit tests and E2E integration tests"

          export NODE_ENV=test
          export DATABASE_URL="postgresql://appuser:apppass@localhost:5432/appdb"
          export REDIS_URL="redis://:redispass@localhost:6379"

          echo "Running unit tests with coverage..."
          UNIT_TEST_OUTPUT=$(pnpm exec jest --coverage --coverageReporters=json --coverageReporters=lcov --passWithNoTests --verbose 2>&1)
          UNIT_TEST_EXIT_CODE=$?

          echo "$UNIT_TEST_OUTPUT" > unit-test-results.txt
          echo "=== UNIT TEST EXECUTION SUMMARY ===" >> test-results-summary.txt
          echo "$UNIT_TEST_OUTPUT" >> test-results-summary.txt
          echo "" >> test-results-summary.txt

          if [ $UNIT_TEST_EXIT_CODE -eq 0 ]; then
            echo "✅ Unit tests passed with coverage"
          elif echo "$UNIT_TEST_OUTPUT" | grep -q "No tests found"; then
            echo "⚠️ No unit tests found - skipping"
          else
            echo "❌ Unit tests failed:"
            echo "$UNIT_TEST_OUTPUT"
          fi

          echo "Running end-to-end integration tests..."
          E2E_TEST_OUTPUT=$(pnpm exec jest --config ./test/jest-e2e.json --passWithNoTests --verbose 2>&1)
          E2E_TEST_EXIT_CODE=$?

          echo "$E2E_TEST_OUTPUT" > e2e-test-results.txt
          echo "=== E2E INTEGRATION TEST EXECUTION SUMMARY ===" >> test-results-summary.txt
          echo "$E2E_TEST_OUTPUT" >> test-results-summary.txt
          echo "" >> test-results-summary.txt

          if [ $E2E_TEST_EXIT_CODE -eq 0 ]; then
            echo "✅ E2E integration tests passed"
          elif echo "$E2E_TEST_OUTPUT" | grep -q "No tests found"; then
            echo "⚠️ No e2e tests found - skipping"
          else
            echo "❌ E2E integration tests failed:"
            echo "$E2E_TEST_OUTPUT"
          fi

          echo "✅ Complete test suite finished"

      - name: Upload Test Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-test-suite-coverage
          path: nestjs_backend/coverage/

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: complete-test-suite-results
          path: |
            nestjs_backend/unit-test-results.txt
            nestjs_backend/e2e-test-results.txt
            nestjs_backend/test-results-summary.txt

      - name: 📋 Collect Docker Compose Logs
        if: always()
        run: |
          echo "Collecting docker compose logs..."

          echo "=== Container Status ===" > docker-compose-logs.txt
          docker compose ps >> docker-compose-logs.txt 2>&1 || echo "Failed to get container status" >> docker-compose-logs.txt

          echo -e "\n=== Service Logs ===" >> docker-compose-logs.txt
          docker compose logs >> docker-compose-logs.txt 2>&1 || echo "Failed to collect logs" >> docker-compose-logs.txt

          echo "🧹 Cleaning up services..."
          docker compose down --volumes --remove-orphans || echo "Failed to clean up services"

      - name: Upload Docker Environment Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-logs
          path: docker-compose-logs.txt

  # ==========================================
  # JOB 10: Security Summary and Reporting
  # ==========================================
  security-summary:
    name: Security Summary & Report
    runs-on: ubuntu-latest
    needs:
      [
        gitleaks-scan,
        backend-dependency-check,
        codeql-analysis,
        sonarcloud,
        build-and-test-backend,
        checkov-iac-scan,
        docker-build-scan,
      ]
    if: always()
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-reports/

      - name: Parse Security Results
        id: parse-results
        run: |
          echo "Parsing security scan results for monorepo..."

          CRITICAL_COUNT=0
          HIGH_COUNT=0
          MEDIUM_COUNT=0
          LOW_COUNT=0
          FINDINGS=""

          echo "=== Scanning for artifacts ==="
          find security-reports -type f \( -name "*.sarif" -o -name "*.json" \) 2>/dev/null || echo "No reports found"

          # 1. Parse Gitleaks SARIF
          echo "Checking Gitleaks results..."
          GITLEAKS_SARIF=$(find security-reports -type f -name "results.sarif" 2>/dev/null | grep -i gitleaks | head -1)
          if [ -z "$GITLEAKS_SARIF" ]; then
            GITLEAKS_SARIF=$(find security-reports -type f -name "*.sarif" 2>/dev/null | grep -i gitleaks | head -1)
          fi

          if [ -n "$GITLEAKS_SARIF" ] && [ -f "$GITLEAKS_SARIF" ]; then
            echo "Found Gitleaks SARIF: $GITLEAKS_SARIF"
            GITLEAKS_COUNT=$(jq '[.runs[]?.results[]? // empty] | length' "$GITLEAKS_SARIF" 2>/dev/null || echo "0")
            if [ "$GITLEAKS_COUNT" -gt 0 ]; then
              CRITICAL_COUNT=$((CRITICAL_COUNT + GITLEAKS_COUNT))
              GITLEAKS_DETAILS=$(jq -r '[.runs[]?.results[]? // empty] | group_by(.ruleId) | map("\(.length)x \(.[0].ruleId)") | join(", ")' "$GITLEAKS_SARIF" 2>/dev/null || echo "")
              FINDINGS="${FINDINGS}### 🔴 Gitleaks: $GITLEAKS_COUNT secret(s) detected\n"
              if [ -n "$GITLEAKS_DETAILS" ]; then
                FINDINGS="${FINDINGS}**Details:** $GITLEAKS_DETAILS\n"
              fi
            else
              FINDINGS="${FINDINGS}### ✅ Gitleaks: No secrets detected\n"
            fi
          else
            echo "No Gitleaks SARIF found"
            FINDINGS="${FINDINGS}### ⚠️ Gitleaks: Report not found\n"
          fi

          # 2. Parse Backend OWASP Dependency Check
          echo "Checking OWASP Dependency Check results..."
          OWASP_JSON=$(find security-reports -type f -name "dependency-check-report.json" 2>/dev/null | head -1)
          if [ -n "$OWASP_JSON" ] && [ -f "$OWASP_JSON" ]; then
            echo "Found OWASP JSON: $OWASP_JSON"
            DEP_CRITICAL=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="CRITICAL")] | length' "$OWASP_JSON" 2>/dev/null || echo "0")
            DEP_HIGH=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="HIGH")] | length' "$OWASP_JSON" 2>/dev/null || echo "0")
            DEP_MEDIUM=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="MEDIUM")] | length' "$OWASP_JSON" 2>/dev/null || echo "0")
            
            CRITICAL_COUNT=$((CRITICAL_COUNT + DEP_CRITICAL))
            HIGH_COUNT=$((HIGH_COUNT + DEP_HIGH))
            MEDIUM_COUNT=$((MEDIUM_COUNT + DEP_MEDIUM))
            
            if [ "$DEP_CRITICAL" -gt 0 ] || [ "$DEP_HIGH" -gt 0 ]; then
              FINDINGS="${FINDINGS}### 🔴 Backend OWASP Dependency Check: $DEP_CRITICAL critical, $DEP_HIGH high, $DEP_MEDIUM medium\n"
              
              TOP_VULNS=$(jq -r '[.dependencies[]?.vulnerabilities[]? | select(.severity=="CRITICAL" or .severity=="HIGH")] | sort_by(.cvssv3.baseScore // 0) | reverse | limit(5; .[]) | "- **\(.name // .source.name)** (\(.severity), CVSS: \(.cvssv3.baseScore // "N/A"))"' "$OWASP_JSON" 2>/dev/null || echo "")
              if [ -n "$TOP_VULNS" ]; then
                FINDINGS="${FINDINGS}**Top Issues:**\n$TOP_VULNS\n"
              fi
            else
              FINDINGS="${FINDINGS}### ✅ Backend OWASP Dependency Check: No critical/high vulnerabilities ($DEP_MEDIUM medium)\n"
            fi
          else
            echo "No OWASP JSON found"
            if [[ "${{ needs.backend-dependency-check.result }}" == "skipped" ]]; then
              FINDINGS="${FINDINGS}### ⏭️ Backend OWASP Dependency Check: Skipped (no backend changes)\n"
            else
              FINDINGS="${FINDINGS}### ⚠️ Backend OWASP Dependency Check: Report not found\n"
            fi
          fi

          # 3. Parse SonarCloud results
          echo "Checking SonarCloud results..."
          if [[ "${{ needs.sonarcloud.result }}" == "failure" ]]; then
            FINDINGS="${FINDINGS}### 🟠 SonarCloud Quality Gate: FAILED\n"
            FINDINGS="${FINDINGS}**Status:** Code quality issues detected. Check SonarCloud Dashboard\n"
            HIGH_COUNT=$((HIGH_COUNT + 1))
          elif [[ "${{ needs.sonarcloud.result }}" == "success" ]]; then
            FINDINGS="${FINDINGS}### ✅ SonarCloud Quality Gate: PASSED\n"
          elif [[ "${{ needs.sonarcloud.result }}" == "skipped" ]]; then
            FINDINGS="${FINDINGS}### ⏭️ SonarCloud Quality Gate: Skipped\n"
          fi

          # 4. Parse CodeQL results
          echo "Checking CodeQL results..."
          if [[ "${{ needs.codeql-analysis.result }}" == "success" ]]; then
            FINDINGS="${FINDINGS}### ✅ CodeQL Security Analysis: Completed\n"
          elif [[ "${{ needs.codeql-analysis.result }}" == "failure" ]]; then
            FINDINGS="${FINDINGS}### 🔴 CodeQL Security Analysis: Issues detected\n"
            HIGH_COUNT=$((HIGH_COUNT + 1))
          elif [[ "${{ needs.codeql-analysis.result }}" == "skipped" ]]; then
            FINDINGS="${FINDINGS}### ⏭️ CodeQL Security Analysis: Skipped (no backend changes)\n"
          fi

          # 5. License compliance check
          echo "Checking license compliance..."
          LICENSE_SUMMARY=$(find security-reports -type f -name "license-summary.txt" 2>/dev/null | head -1)
          if [ -n "$LICENSE_SUMMARY" ] && [ -f "$LICENSE_SUMMARY" ]; then
            UNLICENSED=$(grep -c "UNLICENSED" "$LICENSE_SUMMARY" 2>/dev/null | tr -d '\n' || echo "0")
            # Ensure UNLICENSED is a valid number
            if ! [[ "$UNLICENSED" =~ ^[0-9]+$ ]]; then
              UNLICENSED=0
            fi
            
            if [ "$UNLICENSED" -gt 0 ]; then
              FINDINGS="${FINDINGS}### ⚠️ License Compliance: $UNLICENSED packages without licenses\n"
            else
              FINDINGS="${FINDINGS}### ✅ License Compliance: All packages properly licensed\n"
            fi
          else
            FINDINGS="${FINDINGS}### ✅ License Compliance: Check completed\n"
          fi

          # 6. Parse Checkov IaC scan
          echo "Checking Checkov results..."
          CHECKOV_JSON=$(find security-reports -type f -name "results_json.json" 2>/dev/null | grep -i checkov | head -1)

          if [ -n "$CHECKOV_JSON" ] && [ -f "$CHECKOV_JSON" ]; then
            echo "Found Checkov JSON: $CHECKOV_JSON"
            
            CHECKOV_FAILED=0
            CHECKOV_PASSED=0
            CHECKOV_DETAILS=""
            
            for check_type in dockerfile terraform kubernetes github_actions; do
              TYPE_FAILED=$(jq -r "select(.check_type==\"$check_type\") | .summary.failed // 0" "$CHECKOV_JSON" 2>/dev/null | head -1)
              TYPE_PASSED=$(jq -r "select(.check_type==\"$check_type\") | .summary.passed // 0" "$CHECKOV_JSON" 2>/dev/null | head -1)
              
              # Ensure we have valid numbers
              if ! [[ "$TYPE_FAILED" =~ ^[0-9]+$ ]]; then
                TYPE_FAILED=0
              fi
              if ! [[ "$TYPE_PASSED" =~ ^[0-9]+$ ]]; then
                TYPE_PASSED=0
              fi
              
              if [ "$TYPE_FAILED" -gt 0 ] || [ "$TYPE_PASSED" -gt 0 ]; then
                CHECKOV_FAILED=$((CHECKOV_FAILED + TYPE_FAILED))
                CHECKOV_PASSED=$((CHECKOV_PASSED + TYPE_PASSED))
                
                if [ "$TYPE_FAILED" -gt 0 ]; then
                  FAILED_CHECKS=$(jq -r "select(.check_type==\"$check_type\") | .results.failed_checks[]? | \"- \(.check_name) (\(.check_id)) in \(.file_path)\"" "$CHECKOV_JSON" 2>/dev/null | head -5)
                  if [ -n "$FAILED_CHECKS" ]; then
                    CHECKOV_DETAILS="${CHECKOV_DETAILS}\n${check_type} issues:\n${FAILED_CHECKS}\n"
                  fi
                fi
              fi
            done
            
            if [ "$CHECKOV_FAILED" -gt 0 ]; then
              FINDINGS="${FINDINGS}### 🟡 Checkov IaC Security: $CHECKOV_FAILED failed checks, $CHECKOV_PASSED passed\n"
              if [ -n "$CHECKOV_DETAILS" ]; then
                FINDINGS="${FINDINGS}${CHECKOV_DETAILS}"
              fi
              MEDIUM_COUNT=$((MEDIUM_COUNT + CHECKOV_FAILED))
            else
              FINDINGS="${FINDINGS}### ✅ Checkov IaC Security: All checks passed ($CHECKOV_PASSED)\n"
            fi
          else
            echo "No Checkov JSON found, checking job status..."
            if [[ "${{ needs.checkov-iac-scan.result }}" == "success" ]]; then
              FINDINGS="${FINDINGS}### ✅ Checkov IaC Security: Scan completed\n"
            elif [[ "${{ needs.checkov-iac-scan.result }}" == "failure" ]]; then
              FINDINGS="${FINDINGS}### 🟡 Checkov IaC Security: Issues detected (report not found)\n"
            else
              FINDINGS="${FINDINGS}### ⏭️ Checkov IaC Security: Skipped\n"
            fi
          fi

          # 7. Parse Trivy Container Scans
          echo "Checking Trivy results..."
          TRIVY_REPORTS=$(find security-reports -type f -name "trivy-*.sarif" 2>/dev/null)
          TRIVY_CRITICAL=0
          TRIVY_HIGH=0
          TRIVY_MEDIUM=0
          TRIVY_FILES=""
          if [ -n "$TRIVY_REPORTS" ]; then
            for trivy_file in $TRIVY_REPORTS; do
              echo "Parsing: $trivy_file"
              T_CRIT=$(jq '[.runs[]?.results[]? // empty | select(.level=="error")] | length' "$trivy_file" 2>/dev/null || echo "0")
              T_HIGH=$(jq '[.runs[]?.results[]? // empty | select(.level=="warning")] | length' "$trivy_file" 2>/dev/null || echo "0")
              T_MED=$(jq '[.runs[]?.results[]? // empty | select(.level=="note")] | length' "$trivy_file" 2>/dev/null || echo "0")
              TRIVY_CRITICAL=$((TRIVY_CRITICAL + T_CRIT))
              TRIVY_HIGH=$((TRIVY_HIGH + T_HIGH))
              TRIVY_MEDIUM=$((TRIVY_MEDIUM + T_MED))
              TRIVY_FILES="$TRIVY_FILES\n- $trivy_file: $T_CRIT critical, $T_HIGH high, $T_MED medium"
            done
            CRITICAL_COUNT=$((CRITICAL_COUNT + TRIVY_CRITICAL))
            HIGH_COUNT=$((HIGH_COUNT + TRIVY_HIGH))
            MEDIUM_COUNT=$((MEDIUM_COUNT + TRIVY_MEDIUM))
            if [ "$TRIVY_CRITICAL" -gt 0 ] || [ "$TRIVY_HIGH" -gt 0 ]; then
              FINDINGS="${FINDINGS}### 🔴 Trivy Container Scans: $TRIVY_CRITICAL critical, $TRIVY_HIGH high, $TRIVY_MEDIUM medium\n${TRIVY_FILES}\n"
            else
              FINDINGS="${FINDINGS}### ✅ Trivy Container Scans: No critical/high vulnerabilities ($TRIVY_MEDIUM medium)\n"
            fi
          else
            FINDINGS="${FINDINGS}### ✅ Trivy Container Scans: Completed\n"
          fi

          # Save outputs
          echo "critical_count=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "high_count=$HIGH_COUNT" >> $GITHUB_OUTPUT
          echo "medium_count=$MEDIUM_COUNT" >> $GITHUB_OUTPUT
          echo "low_count=$LOW_COUNT" >> $GITHUB_OUTPUT
          echo "has_critical=$([[ $CRITICAL_COUNT -gt 0 ]] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

          # Create summary with printf to avoid sed issues
          BACKEND_CHANGED="${{ needs.initialize.outputs.backend_changed }}"
          if [ -z "$BACKEND_CHANGED" ]; then
            BACKEND_CHANGED="false"
          fi

          cat > security-summary.md << 'EOFMARKER'
          # 🔒 Monorepo Security Scan Summary

          **Pipeline Run:** #${{ github.run_number }}
          **Branch:** `${{ github.ref_name }}`
          **Commit:** `${{ github.sha }}`
          **Backend Changed:** BACKEND_CHANGED_PLACEHOLDER

          ## 📊 Vulnerability Overview

          | Severity | Count |
          |----------|-------|
          | 🔴 Critical | CRITICAL_COUNT_PLACEHOLDER |
          | 🟠 High | HIGH_COUNT_PLACEHOLDER |
          | 🟡 Medium | MEDIUM_COUNT_PLACEHOLDER |
          | 🔵 Low | LOW_COUNT_PLACEHOLDER |

          ## 🔍 Scan Results

          FINDINGS_PLACEHOLDER

          ## 📦 Components Analyzed

          - **NestJS Backend** (`nestjs_backend/`): API server security analysis
          - **Infrastructure**: Docker, docker-compose.yml, environment configuration
          - **Shared Resources**: Root-level configuration and secrets
          - **Dependencies**: pnpm packages vulnerability scanning
          - **Code Quality**: Static analysis and security patterns

          ## 📄 Detailed Reports

          All detailed reports are available as artifacts in this workflow run.
          - [View GitHub Security Tab](https://github.com/${{ github.repository }}/security)
          - [View Workflow Artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---
          *Generated by NestJS Monorepo CI/CD Pipeline*
          EOFMARKER

          # Replace placeholders using perl instead of sed to handle special characters
          perl -i -pe "s/CRITICAL_COUNT_PLACEHOLDER/$CRITICAL_COUNT/g" security-summary.md
          perl -i -pe "s/HIGH_COUNT_PLACEHOLDER/$HIGH_COUNT/g" security-summary.md
          perl -i -pe "s/MEDIUM_COUNT_PLACEHOLDER/$MEDIUM_COUNT/g" security-summary.md
          perl -i -pe "s/LOW_COUNT_PLACEHOLDER/$LOW_COUNT/g" security-summary.md

          # Write findings to a temporary file and insert it
          printf "%b" "$FINDINGS" > findings.tmp
          perl -i -pe 'BEGIN{undef $/;} s/FINDINGS_PLACEHOLDER/`cat findings.tmp`/e' security-summary.md
          rm -f findings.tmp

          echo "=== FINAL SUMMARY ==="
          cat security-summary.md

      - name: Comment PR with Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security-summary.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Monorepo Security Scan Summary')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: summary
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary
              });
            }

      - name: Create Issue for Critical Findings
        if: steps.parse-results.outputs.has_critical == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security-summary.md', 'utf8');

            const title = `Critical Security Vulnerabilities Detected - ${context.sha.substring(0, 7)}`;

            const body = `${summary}

            ## Action Required

            Critical security vulnerabilities have been detected in the backend. 
            Please review the security reports and address these issues immediately.

            **Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            **Branch:** ${context.ref}
            **Triggered by:** ${context.actor}
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'critical', 'automated', 'backend']
            });

      - name: Upload Security Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md

      - name: ✅ Mark Security Scan Complete
        run: echo "✅ Monorepo security summary generated successfully"

  # ==========================================
  # JOB 11: Final Quality Gate
  # ==========================================
  quality-gate:
    name: Final Quality Gate
    runs-on: ubuntu-latest
    needs: [gitleaks-scan, backend-dependency-check, security-summary, build-and-test-backend, sonarcloud, integration-test]
    if: always()
    steps:
      - name: Check All Jobs Status
        run: |
          echo "=================================="
          echo "🔍 Monorepo Pipeline Quality Gate"
          echo "=================================="

          echo ""
          echo "Job Status:"
          echo "  Gitleaks:            ${{ needs.gitleaks-scan.result }}"
          echo "  OWASP Dependency:    ${{ needs.backend-dependency-check.result }}"
          echo "  Build & Test:        ${{ needs.build-and-test-backend.result }}"
          echo "  SonarCloud:          ${{ needs.sonarcloud.result }}"
          echo "  Integration Test:    ${{ needs.integration-test.result }}"
          echo "  Security Summary:    ${{ needs.security-summary.result }}"
          echo ""

          CRITICAL_FAILED=0

          if [[ "${{ needs.gitleaks-scan.result }}" == "failure" ]]; then
            echo "❌ CRITICAL: Gitleaks secret scanning failed - secrets detected!"
            CRITICAL_FAILED=1
          else
            echo "✅ Gitleaks passed - no secrets detected"
          fi

          if [[ "${{ needs.backend-dependency-check.result }}" == "failure" ]]; then
            echo "❌ CRITICAL: OWASP Dependency Check failed - critical vulnerabilities detected!"
            CRITICAL_FAILED=1
          elif [[ "${{ needs.backend-dependency-check.result }}" == "skipped" ]]; then
            echo "⏭️  OWASP Dependency Check skipped (no backend changes)"
          else
            echo "✅ OWASP Dependency Check passed"
          fi

          if [[ "${{ needs.build-and-test-backend.result }}" == "failure" ]]; then
            echo "❌ CRITICAL: Build and test failed!"
            CRITICAL_FAILED=1
          elif [[ "${{ needs.build-and-test-backend.result }}" == "skipped" ]]; then
            echo "⏭️  Build & Test skipped (no backend changes)"
          else
            echo "✅ Build & Test passed"
          fi

          if [[ "${{ needs.integration-test.result }}" == "failure" ]]; then
            echo "❌ CRITICAL: Integration tests failed!"
            CRITICAL_FAILED=1
          elif [[ "${{ needs.integration-test.result }}" == "skipped" ]]; then
            echo "⏭️  Integration tests skipped"
          else
            echo "✅ Integration tests passed"
          fi

          if [[ "${{ needs.sonarcloud.result }}" == "failure" ]]; then
            echo "⚠️  WARNING: SonarCloud Quality Gate failed (informational)"
          fi

          echo ""
          if [ $CRITICAL_FAILED -eq 1 ]; then
            echo "=================================="
            echo "❌ QUALITY GATE FAILED"
            echo "=================================="
            echo "Critical security or build issues detected."
            echo "Pipeline cannot proceed to deployment."
            exit 1
          else
            echo "=================================="
            echo "✅ QUALITY GATE PASSED"
            echo "=================================="
            echo "All critical checks passed successfully!"
          fi

      - name: Pipeline Success
        if: success()
        run: |
          echo "Pipeline completed successfully!"
          echo "- All security checks passed"
          echo "- Build and tests passed"
          echo "- Quality gate passed"
          echo "- Ready for deployment"
