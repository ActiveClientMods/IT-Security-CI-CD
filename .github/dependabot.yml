version: 2
updates:
  # Python Dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5 # Reduced to avoid chaos
    reviewers:
      - "ActiveClientMods"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "🔒 Security"
      include: "scope"
    # Group updates to reduce number of PRs
    groups:
      security-updates:
        patterns:
          - "*"
        update-types:
          - "security"

  # JavaScript/npm Dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"
    open-pull-requests-limit: 5 # Reduced
    reviewers:
      - "ActiveClientMods"
    labels:
      - "dependencies"
      - "security"
    # Group updates to reduce PRs
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

  # Docker Dependencies
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday" # Different day to spread load
      time: "03:00"
    open-pull-requests-limit: 3
    reviewers:
      - "ActiveClientMods"
    labels:
      - "docker"
      - "security"

  # GitHub Actions Dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "first monday"
    open-pull-requests-limit: 5
    reviewers:
      - "ActiveClientMods"
    labels:
      - "github-actions"
      - "maintenance"

  # Maven/Java Dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "ActiveClientMods"
    labels:
      - "java"
      - "dependencies"
    groups:
      spring-framework:
        patterns:
          - "org.springframework*"

  # Terraform Dependencies
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "03:00"
    open-pull-requests-limit: 3
    reviewers:
      - "ActiveClientMods"
    labels:
      - "terraform"
      - "infrastructure"
