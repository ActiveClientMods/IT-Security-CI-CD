# GitHub Username "_" GitHub Repo Name
sonar.projectKey=ActiveClientMods_IT-Security-CI-CD

# Organization Token
sonar.organization=activeclientmods999

# Project information
sonar.projectName=IT-Security-CI-CD
sonar.projectVersion=1.0

sonar.language=py,js,ts

# Source code settings - NestJS backend focus
sonar.sources=nestjs_backend/src
sonar.tests=nestjs_backend/test
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.javascript.lcov.reportPaths=nestjs_backend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=nestjs_backend/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.spec.ts,**/*.test.ts
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

# Coverage exclusions
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/tests/**

# External reports - Only include if files exist
# sonar.externalIssuesReportPaths=reports/gitleaks-report.json,reports/dependency-check-report.json,reports/trivy-report.json

# Quality Gate
sonar.qualitygate.wait=true