services:
  # Backend Service (NestJS API)
  backend:
    build:
      context: ./nestjs_backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # SECURITY ISSUE: Hardcoded credentials in docker-compose (Checkov will detect)
      - DB_PASSWORD=MyHardcodedPassword123!
      - API_KEY=sk-1234567890abcdefghijklmnopqrstuvwxyz
    env_file:
      - .env
    volumes:
      - ./nestjs_backend/dist:/app/dist:ro
    # SECURITY ISSUE: No resource limits (Checkov will detect)
    # SECURITY ISSUE: Running with privileged mode
    privileged: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    depends_on:
      - database
      - redis

  # Database Service (PostgreSQL)
  database:
    # SECURITY ISSUE: Using old PostgreSQL version with known vulnerabilities
    image: postgres:12.0-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-appdb}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apppass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      # SECURITY ISSUE: Exposing database to host (Checkov will warn)
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-appdb}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

  # Cache Service (Redis)
  redis:
    # SECURITY ISSUE: Using old Redis version
    image: redis:5.0.0-alpine
    # SECURITY ISSUE: Redis without password
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
