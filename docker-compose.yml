services:
  # Backend Service (NestJS API)
  backend:
    build:
      context: ./nestjs_backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    volumes:
      - ./nestjs_backend/dist:/app/dist:ro
    # Security: Resource limits to prevent DoS
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    # Security: Run as non-root user
    user: "node"
    # Security: Read-only root filesystem
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
      - /app/.npm:noexec,nosuid,size=100M
    # Security: Drop all capabilities, add only required ones
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Database Service (PostgreSQL)
  database:
    # Security: Using latest stable PostgreSQL version
    image: postgres:17.2-alpine3.21
    environment:
      POSTGRES_DB: ${DB_NAME:-appdb}
      POSTGRES_USER: ${DB_USER:-appuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      # Security: Disable trust authentication
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      # Security: Set connection limits
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-100}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: Uncomment if you create init script
      # - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    # Security: Only expose to internal network, not to host
    expose:
      - "5432"
    # Uncomment only for development/debugging
    # ports:
    #   - "127.0.0.1:5432:5432"
    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    # Security: Run as postgres user (default, non-root)
    user: "postgres"
    # Security: Drop all capabilities
    cap_drop:
      - ALL
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true
    # Security: Read-only root filesystem (except data directory)
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100M
      - /run/postgresql:noexec,nosuid,size=10M
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DB_USER:-appuser} -d ${DB_NAME:-appdb}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network
    restart: unless-stopped

  # Cache Service (Redis)
  redis:
    # Security: Using latest stable Redis version
    image: redis:7.4.2-alpine3.21
    # Security: Enable password authentication and secure configurations
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?Redis password required}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --timeout 300
      --tcp-keepalive 60
      --bind 0.0.0.0
      --protected-mode yes
      --port 6379
      --loglevel notice
      --databases 16
      --save 900 1
      --save 300 10
      --save 60 10000
      --rdbcompression yes
      --rdbchecksum yes
    volumes:
      - redis_data:/data
    # Security: Only expose to internal network
    expose:
      - "6379"
    # Uncomment only for development/debugging
    # ports:
    #   - "127.0.0.1:6379:6379"
    # Security: Resource limits
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    # Security: Run as redis user (default, non-root)
    user: "redis"
    # Security: Drop all capabilities
    cap_drop:
      - ALL
    # Security: No new privileges
    security_opt:
      - no-new-privileges:true
    # Security: Read-only root filesystem (except data directory)
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50M
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "AUTH",
          "${REDIS_PASSWORD:?Redis password required}",
          "PING",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: app-bridge
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.driver.mtu: "1500"
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
