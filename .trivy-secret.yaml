# Trivy Secret Scanning Configuration
# Patterns for detecting secrets in code

# Custom secret patterns (in addition to default ones)
custom:
  - id: custom-api-key
    category: API Key
    title: Custom API Key Pattern
    severity: HIGH
    regex: '(?i)(api[_-]?key|apikey)\s*[:=]\s*["\047]?([a-z0-9_\-]{20,})["\047]?'

  - id: custom-password
    category: Password
    title: Hardcoded Password
    severity: CRITICAL
    regex: '(?i)(password|passwd|pwd)\s*[:=]\s*["\047]?([^\s"\047]{8,})["\047]?'

  - id: custom-token
    category: Token
    title: Generic Token
    severity: HIGH
    regex: '(?i)(token|secret)\s*[:=]\s*["\047]?([a-z0-9_\-]{16,})["\047]?'

# Allow list - paths to ignore
allow:
  - path: "test/**"
    reason: "Test files may contain dummy credentials"
  - path: "**/*.md"
    reason: "Documentation files"
  - path: ".git/**"
    reason: "Git metadata"
