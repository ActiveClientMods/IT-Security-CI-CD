# Checkov Configuration File
# Documentation: https://www.checkov.io/2.Basics/Suppressing%20and%20Skipping%20Policies.html

# Directories to scan
directory:
  - .

# Frameworks to check
framework:
  - dockerfile
  - docker_compose
  - github_actions
  - secrets

# Skip paths to reduce noise
skip-path:
  - .git
  - node_modules
  - .venv
  - venv
  - build
  - dist
  - coverage

# Compact output for cleaner logs
compact: false

# Quiet mode (only show failed checks)
quiet: false

# Download external modules for Terraform/etc
download-external-modules: true

# Soft fail - don't block pipeline, just report issues
soft-fail: true
